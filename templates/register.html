<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="auth-title">
CareerPilot AI
</div>

<div class="auth-subtitle">
Create your account and start analyzing resumes
</div>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<br><br>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required>

<br><br>

<button
type="submit"
class="btn btn-full">

Create Account

</button>

</form>

<div class="auth-footer">

<p>
Already have an account?
</p>

<a href="/login">
Login
</a>

</div>

</div>

</div>

</body>
</html>
