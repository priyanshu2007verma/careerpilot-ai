<!DOCTYPE html>
<html>
<head>

<title>CareerPilot AI Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="auth-title">
CareerPilot AI
</div>

<div class="auth-subtitle">
AI-Powered Resume Intelligence Platform
</div>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email Address"
required>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required>

<br><br>

<button
type="submit"
class="btn btn-full">

Login

</button>

</form>

<div class="auth-footer">

<p>
Don't have an account?
</p>

<a href="/register">
Create Account
</a>

</div>

</div>

</div>

</body>
</html>
