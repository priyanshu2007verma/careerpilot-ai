<!DOCTYPE html>
<html>
<head>

    <title>Resume History</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="topbar">

        <h1 class="logo">
            Resume History
        </h1>

        <a href="/" class="btn">
            Dashboard
        </a>

    </div>

    {% if history_data %}

        {% for item in history_data %}

        <div class="card">

            <h2>
                📄 {{ item.filename }}
            </h2>

            <br>

            <div class="stats">

                <div class="card">

                    <div class="score">
                        {{ item.resume_score }}
                    </div>

                    <p>
                        Resume Score
                    </p>

                </div>

                <div class="card">

                    <div class="score">
                        {{ item.ats_score }}
                    </div>

                    <p>
                        ATS Score
                    </p>

                </div>

            </div>

            <div class="action-buttons">

                <a
                href="/delete-report/{{ item._id }}"
                class="btn delete-btn"
                onclick="return confirm('Delete this report permanently?')">

                    Delete

                </a>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="card">

            <h2>
                No Reports Found
            </h2>

            <p>
                Upload your first resume to get started.
            </p>

        </div>

    {% endif %}

</div>

</body>
</html>
